name: CI

on:
  push:
    branches: ["main", "claude/**", "feature/**"]
  pull_request:
    branches: ["main"]

env:
  NWN_TOOLS_VERSION: "2.1.2"
  NASHER_VERSION: "1.1.2"

jobs:
  validate:
    name: Validate sources
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Validate JSON sources
        run: |
          error=0
          while IFS= read -r -d '' f; do
            python3 -m json.tool "$f" > /dev/null \
              || { echo "Invalid JSON: $f"; error=1; }
          done < <(find src/ -name '*.json' -print0)
          exit "$error"

      - name: Run smoke test
        run: bash tools/smoke-test.sh

      - name: Install neverwinter.nim compiler tools
        id: nwn_tools
        run: |
          URL="https://github.com/niv/neverwinter.nim/releases/download/${NWN_TOOLS_VERSION}/neverwinter.linux_amd64.tar.gz"
          if curl -fsSL "$URL" -o /tmp/nwn.tar.gz; then
            sudo tar -xzf /tmp/nwn.tar.gz -C /usr/local/bin
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "Installed neverwinter.nim ${NWN_TOOLS_VERSION}"
          else
            echo "::warning::Could not download neverwinter.nim ${NWN_TOOLS_VERSION}. Skipping NWScript compilation."
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compile NWScript
        if: steps.nwn_tools.outputs.available == 'true'
        run: bash tools/compile-scripts.sh

  build-mcp-server:
    name: Build MCP server
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: cd tools/mcp/nwn-project-mcp && npm install

      - name: Build
        run: cd tools/mcp/nwn-project-mcp && npm run build

      - name: Run MCP server tests
        run: cd tools/mcp/nwn-project-mcp && npm test

  package:
    name: Pack module
    needs: validate
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Install Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: stable

      - name: Install Nasher
        run: nimble install -y "nasher@${NASHER_VERSION}"

      - name: Build module and hak artifacts
        run: |
          mkdir -p build/dist
          nasher pack module --yes
          nasher pack art tlk --yes

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: "module-${{ github.sha }}"
          path: build/dist/
          retention-days: 14
