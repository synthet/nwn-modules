services:
  nwserver:
    # IMPORTANT: Pin NWN_SERVER_IMAGE to an immutable commit digest for staging/production.
    # Example (set in docker/.env):
    #   NWN_SERVER_IMAGE=ghcr.io/nwnxee/unified@sha256:<digest>
    # See: https://nwnxee.github.io/unified/
    # The :latest tag is intentionally an override point for local development only.
    image: ${NWN_SERVER_IMAGE:-ghcr.io/nwnxee/unified:latest}
    container_name: nwn-server
    restart: unless-stopped
    env_file:
      - path: env.example
        required: true
      - path: .env
        required: false
    environment:
      NWN_SERVER_NAME: ${NWN_SERVER_NAME:-Starter Module Private PW}
      NWN_MODULE_NAME: ${NWN_MODULE_NAME:-starter_module}
      NWN_MODULE_FILE: ${NWN_MODULE_FILE:-starter_module.mod}
      NWN_PORT: ${NWN_SERVER_PORT:-5121}
      DATABASE_HOST: ${DATABASE_HOST:-db}
      DATABASE_NAME: ${DATABASE_NAME:-nwn_persistent_world}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_USER: ${DATABASE_USER:-nwn}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-change-me-local-only}
      NWSYNC_URL: ${NWSYNC_URL:-http://localhost:8080/nwsync/}
      # NWNX SQL plugin — connects to the db service using the vars above
      NWNX_SQL_TYPE: postgresql
      NWNX_SQL_HOST: ${DATABASE_HOST:-db}
      NWNX_SQL_PORT: ${DATABASE_PORT:-5432}
      NWNX_SQL_USERNAME: ${DATABASE_USER:-nwn}
      NWNX_SQL_PASSWORD: ${DATABASE_PASSWORD:-change-me-local-only}
      NWNX_SQL_DATABASE: ${DATABASE_NAME:-nwn_persistent_world}
      # NWNX ThreadWatchdog — kills and restarts a hung server process
      NWNX_ThreadWatchdog_Timeout: "180"
      # Disable metric export by default; enable when InfluxDB/Grafana are available
      NWNX_Metrics_InfluxDB_SKIP: "true"
    ports:
      - "${NWN_SERVER_PORT:-5121}:5121/udp"
    volumes:
      # Put built .mod/.hak/.tlk files in build/dist, then copy/sync into these
      # mounted runtime folders as part of deployment.
      - ../build/dist:/opt/nwn/build/dist:ro
      - nwn_home:/nwn/home
      - ./runtime/modules:/nwn/home/modules
      - ./runtime/hak:/nwn/home/hak
      - ./runtime/tlk:/nwn/home/tlk
      - ./runtime/logs:/nwn/home/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - nwn_private

  db:
    image: postgres:16-alpine
    container_name: nwn-db
    restart: unless-stopped
    env_file:
      - path: env.example
        required: true
      - path: .env
        required: false
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-nwn_persistent_world}
      POSTGRES_USER: ${DATABASE_USER:-nwn}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-change-me-local-only}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nwn_private

  nwsync:
    image: caddy:2-alpine
    container_name: nwn-nwsync
    restart: unless-stopped
    env_file:
      - path: env.example
        required: true
      - path: .env
        required: false
    ports:
      - "${NWSYNC_HTTP_PORT:-8080}:80/tcp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./runtime/nwsync:/srv/nwsync:ro
    networks:
      - nwn_private

volumes:
  nwn_home:
  postgres_data:

networks:
  nwn_private:
    driver: bridge
